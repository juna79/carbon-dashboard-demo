<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenya Carbon Exchange</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body { background:#050806; color:white; font-family:Inter, sans-serif;}
.glass { background:rgba(255,255,255,0.06); backdrop-filter:blur(16px);}
</style>
</head>

<body class="p-6">

<h1 class="text-4xl font-bold mb-6">Kenya Carbon Exchange</h1>

<div class="glass p-6 rounded-xl mb-6">
<h2 class="text-2xl mb-2">Buy carbon credits with proof, not PDFs</h2>
<p class="text-gray-300">Live demo marketplace for verified African carbon projects.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<div class="glass p-4 rounded-xl">
<h3 class="font-bold">Mau Forest Restoration</h3>
<p>$14 / tonne</p>
<button onclick="buy('Mau Forest')" class="mt-3 bg-green-400 text-black px-4 py-2 rounded">Buy</button>
</div>

<div class="glass p-4 rounded-xl">
<h3 class="font-bold">Cookstoves Kenya</h3>
<p>$9 / tonne</p>
<button onclick="buy('Cookstoves')" class="mt-3 bg-green-400 text-black px-4 py-2 rounded">Buy</button>
</div>

</div>

<div id="toast" class="hidden fixed bottom-5 right-5 bg-green-500 px-4 py-3 rounded">
Purchase complete ✔
</div>

<script>
function buy(name){
  const t=document.getElementById('toast');
  t.innerText = name + " purchased & retired!";
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),3000);
}
</script>

</body>
</html>

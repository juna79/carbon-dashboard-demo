<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenya Carbon Exchange</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e0f2e9; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(15, 23, 20, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(34, 255, 136, 0.15); }
    .neon { text-shadow: 0 0 15px #22ff88; }
  </style>
</head>
<body class="flex min-h-screen">

  <!-- Sidebar -->
  <div class="w-72 glass border-r border-emerald-900 p-6 fixed h-full">
    <div class="flex items-center gap-3 mb-10">
      <i class="fa-solid fa-leaf text-4xl text-emerald-400"></i>
      <h1 class="text-2xl font-bold tracking-tight">KENYA CARBON EXCHANGE</h1>
    </div>
    <nav class="space-y-1">
      <a href="#" class="flex items-center gap-3 px-5 py-4 bg-emerald-900/30 text-emerald-400 rounded-2xl"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="#" class="flex items-center gap-3 px-5 py-4 hover:bg-white/5 rounded-2xl"><i class="fa-solid fa-tree"></i> Projects</a>
      <a href="#" class="flex items-center gap-3 px-5 py-4 hover:bg-white/5 rounded-2xl"><i class="fa-solid fa-store"></i> Marketplace</a>
      <a href="#" class="flex items-center gap-3 px-5 py-4 hover:bg-white/5 rounded-2xl"><i class="fa-solid fa-wallet"></i> Portfolio</a>
      <a href="#" class="flex items-center gap-3 px-5 py-4 hover:bg-white/5 rounded-2xl"><i class="fa-solid fa-certificate"></i> Certificates</a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 ml-72 p-8">

    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold">Discover verified carbon projects in Kenya</h1>
        <p class="text-emerald-400">Transparency. Trust. Impact.</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="bg-emerald-900/30 px-4 py-2 rounded-2xl text-sm flex items-center gap-2">
          <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
          Live data
        </div>
        <div class="w-10 h-10 bg-white/10 rounded-2xl flex items-center justify-center">JW</div>
      </div>
    </div>

    <!-- Metrics -->
    <div class="grid grid-cols-4 gap-6 mb-10">
      <div class="glass rounded-3xl p-6">
        <p class="text-sm text-emerald-400">TOTAL CREDITS AVAILABLE</p>
        <p class="text-5xl font-bold mt-3">12.4M tCO₂</p>
      </div>
      <div class="glass rounded-3xl p-6">
        <p class="text-sm text-emerald-400">VERIFIED PROJECTS</p>
        <p class="text-5xl font-bold mt-3">48</p>
      </div>
      <div class="glass rounded-3xl p-6">
        <p class="text-sm text-emerald-400">CREDITS RETIRED</p>
        <p class="text-5xl font-bold mt-3">5.2M tCO₂</p>
      </div>
      <div class="glass rounded-3xl p-6">
        <p class="text-sm text-emerald-400">AVG PRICE</p>
        <p class="text-5xl font-bold mt-3">$6.45</p>
      </div>
    </div>

    <!-- Featured Projects -->
    <h2 class="text-2xl font-semibold mb-6">Featured Projects</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="featured"></div>

  </div>

  <script>
    const projects = [
      { title: "Mau Forest Protection", location: "Narok County, Kenya", credits: "1.2M", price: "6.20", type: "Forest", img: "https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?q=80&w=800" },
      { title: "Clean Cooking Initiative", location: "Kisumu County, Kenya", credits: "850K", price: "5.40", type: "Cookstove", img: "https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=800" },
      { title: "Lake Turkana Wind", location: "Turkana County, Kenya", credits: "850K", price: "7.10", type: "Renewable", img: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" },
      { title: "Blue Carbon Mangroves", location: "Kilifi County, Kenya", credits: "420K", price: "8.30", type: "Blue Carbon", img: "https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=800" }
    ];

    const container = document.getElementById('featured');
    projects.forEach(p => {
      const div = document.createElement('div');
      div.className = "glass rounded-3xl overflow-hidden card-hover";
      div.innerHTML = `
        <img src="${p.img}" class="w-full h-48 object-cover">
        <div class="p-5">
          <div class="flex justify-between">
            <span class="text-xs bg-emerald-900/50 px-3 py-1 rounded-full">${p.type}</span>
            <span class="text-xs text-emerald-400">Verified</span>
          </div>
          <h3 class="font-bold mt-4">${p.title}</h3>
          <p class="text-sm text-emerald-400/70">${p.location}</p>
          <div class="mt-6 flex justify-between items-end">
            <div>
              <p class="text-3xl font-bold">$${p.price}</p>
              <p class="text-xs text-gray-400">per tCO₂</p>
            </div>
            <p class="text-right text-emerald-400">${p.credits} tCO₂</p>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>

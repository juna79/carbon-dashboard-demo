<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenya Carbon Exchange</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e0f2e9; font-family: 'Inter', sans-serif; }
    .neon-green { text-shadow: 0 0 15px #22ff88; }
    .glass { background: rgba(15, 23, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(34, 255, 136, 0.2); }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 0 30px rgba(34, 255, 136, 0.3); }
  </style>
</head>
<body class="min-h-screen">

  <div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 glass border-r border-green-900 p-6">
      <div class="flex items-center gap-3 mb-12">
        <i class="fa-solid fa-leaf text-4xl text-emerald-400"></i>
        <h1 class="text-2xl font-bold tracking-tight">KENYA CARBON</h1>
      </div>
      <nav class="space-y-2">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-emerald-900/30 text-emerald-400"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5"><i class="fa-solid fa-tree"></i> Projects</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5"><i class="fa-solid fa-store"></i> Marketplace</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5"><i class="fa-solid fa-wallet"></i> Portfolio</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5"><i class="fa-solid fa-certificate"></i> Certificates</a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">

      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-4xl font-bold neon-green">Market Overview</h1>
          <p class="text-emerald-400/70">Real-time African Carbon Market • Updated just now</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="bg-emerald-900/30 px-4 py-2 rounded-2xl text-sm">Live Data</div>
          <div class="w-10 h-10 bg-emerald-400/20 rounded-2xl flex items-center justify-center">JW</div>
        </div>
      </div>

      <!-- Metrics -->
      <div class="grid grid-cols-4 gap-6 mb-10">
        <div class="glass rounded-3xl p-6 card-hover">
          <p class="text-emerald-400 text-sm">TOTAL CREDITS AVAILABLE</p>
          <p class="text-5xl font-bold mt-3">12.4M <span class="text-2xl">tCO₂</span></p>
        </div>
        <div class="glass rounded-3xl p-6 card-hover">
          <p class="text-emerald-400 text-sm">AVG PRICE</p>
          <p class="text-5xl font-bold mt-3">$6.45</p>
        </div>
        <div class="glass rounded-3xl p-6 card-hover">
          <p class="text-emerald-400 text-sm">CREDITS RETIRED</p>
          <p class="text-5xl font-bold mt-3">5.2M</p>
        </div>
        <div class="glass rounded-3xl p-6 card-hover">
          <p class="text-emerald-400 text-sm">ACTIVE PROJECTS</p>
          <p class="text-5xl font-bold mt-3">48</p>
        </div>
      </div>

      <!-- Featured Projects -->
      <h2 class="text-2xl font-semibold mb-6">Featured Projects</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="projects"></div>

    </div>
  </div>

  <script>
    const projects = [
      {name: "Mau Forest Protection", location: "Narok County", credits: "1.2M", price: "6.20", type: "Forest", img: "🌳"},
      {name: "Clean Cooking Initiative", location: "Kisumu", credits: "850K", price: "5.40", type: "Cookstove", img: "🔥"},
      {name: "Lake Turkana Wind", location: "Turkana", credits: "850K", price: "7.10", type: "Renewable", img: "🌬️"},
      {name: "Blue Carbon Mangroves", location: "Kilifi", credits: "420K", price: "8.30", type: "Blue Carbon", img: "🌊"}
    ];

    const container = document.getElementById('projects');
    projects.forEach(p => {
      const div = document.createElement('div');
      div.className = "glass rounded-3xl p-6 card-hover cursor-pointer";
      div.innerHTML = `
        <div class="text-5xl mb-4">${p.img}</div>
        <h3 class="font-bold text-xl">${p.name}</h3>
        <p class="text-emerald-400/70 text-sm">${p.location}</p>
        <div class="mt-6 flex justify-between">
          <div>
            <p class="text-3xl font-bold">$${p.price}</p>
            <p class="text-xs text-gray-400">per tCO₂</p>
          </div>
          <div class="text-right">
            <p class="text-emerald-400">${p.credits} tCO₂</p>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>
